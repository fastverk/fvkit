syntax = "proto3";

// fastverk volume + maintenance state.
//
// Volumes are the managed filesystem locations fastverk provisions: one
// for git repos + worktrees, one for Bazel caches. Maintenance is the
// periodic cleanup `fvd` runs (cache GC, bazel clean, git gc, worktree
// prune, update check).

package fastverk.v1;

// A volume fastverk manages. On macOS each is an APFS volume in the boot
// container; on Linux/Windows the per-OS backend fills the same shape
// (mount point + usage).
message VolumeSpec {
  // Stable id: "repos" | "caches".
  string id = 1;
  // Human label, e.g. "Bazel caches".
  string display_name = 2;
  // Mount point, e.g. "/Volumes/Workspace".
  string mount_point = 3;
  // Filesystem volume label, e.g. APFS volume "Workspace".
  string fs_volume = 4;
  // Optional size cap in bytes; 0 = no quota.
  int64 quota_bytes = 5;
}

// Observed state of a managed volume.
message VolumeState {
  // The volume this state describes.
  VolumeSpec spec = 1;
  // Whether the volume exists (created), regardless of mount.
  bool exists = 2;
  // Whether the volume is currently mounted at its mount point.
  bool mounted = 3;
  // Bytes used on the volume.
  int64 used_bytes = 4;
  // Bytes free on the volume.
  int64 free_bytes = 5;
  // Backing device node, e.g. "disk3s7".
  string device = 6;
}

// What fastverk would do with a managed location, computed by a
// read-only audit before any change. fastverk never reformats, mounts
// over, or deletes existing data: it only creates genuinely-absent
// volumes and adopts/augments existing ones in place.
enum VolumeDisposition {
  // Unset.
  VOLUME_DISPOSITION_UNSPECIFIED = 0;
  // Nothing at the mount point — safe to create a new dedicated volume.
  VOLUME_DISPOSITION_CREATE = 1;
  // Already a dedicated volume here — adopted as-is and left untouched.
  VOLUME_DISPOSITION_ADOPT = 2;
  // A plain folder on a shared volume holds the data — used in place and
  // augmented (never mounted over / overwritten); may later be moved onto
  // a dedicated volume.
  VOLUME_DISPOSITION_MIGRATE = 3;
  // Unexpected state needing manual review; fastverk will not touch it.
  VOLUME_DISPOSITION_CONFLICT = 4;
}

// The result of auditing one managed location before any change. This is
// the safety contract: an install inspects what already exists and only
// ever creates-when-absent or adopts/augments-in-place.
message VolumeAudit {
  // Observed state of the location.
  VolumeState state = 1;
  // What fastverk would do (non-destructively).
  VolumeDisposition disposition = 2;
  // Filesystem type at the mount point when it is its own volume, e.g.
  // "apfs"; empty when not a dedicated mount.
  string fs_type = 3;
  // Whether the location is its own mount point (a dedicated volume) vs a
  // folder living on a shared/parent volume.
  bool dedicated_volume = 4;
  // Human-facing explanation of the disposition.
  string detail = 5;
}

// Outcome of a single maintenance task.
message MaintenanceTask {
  // Task name: "disk-cache-gc" | "bazel-clean" | "git-gc" |
  // "worktree-prune" | "update-check".
  string name = 1;
  // Whether the task completed successfully.
  bool ok = 2;
  // Human-readable detail or error summary.
  string detail = 3;
  // Bytes reclaimed by this task (0 when not applicable).
  int64 bytes_reclaimed = 4;
}

// Result of one maintenance run.
message MaintenanceReport {
  // When the run started. RFC 3339.
  string started_at = 1;
  // When the run finished. RFC 3339; empty while still running.
  string finished_at = 2;
  // Whether this was a no-op preview (nothing was actually changed).
  bool validate_only = 3;
  // Per-task outcomes.
  repeated MaintenanceTask tasks = 4;
}

// ── Maintenance as an interface ──────────────────────────────────────────────
//
// Maintenance is descriptor-driven, not hardcoded: the set of tasks is DATA
// (MaintenanceTaskSpec), and a task PROVIDER implements the Maintenance service
// to run them. fvd provides the built-in tasks in-process; out-of-tree tasks
// ship as plugins implementing this same service, discovered via the plugin
// manifest — the same QueryRPC model as every other fastverk capability. The
// MaintainNow RPC on the Fvd service is the "run all" aggregate over this set.

// Declarative cadence read by fvd's scheduler.
message Schedule {
  // Run at most once per this many seconds; 0 = on-demand only.
  uint32 interval_seconds = 1;
}

// The descriptor for a maintenance task — what it is, how often it should run,
// and what it touches. A renderer (meridian), the scheduler, and the CLI all
// read specs rather than knowing tasks by hand.
message MaintenanceTaskSpec {
  // Stable id, e.g. "output-base-gc". Matches MaintenanceTask.name.
  string id = 1;
  string display_name = 2;
  string description = 3;
  // Cadence for unattended runs.
  Schedule schedule = 4;
  // Whether the task runs in an unfiltered (`only`-empty) maintenance run.
  bool default_enabled = 5;
  // What it operates on, e.g. "bazel-output" | "disk-cache" | "repos".
  string scope = 6;
  // True when the task only ever reclaims regenerable state (safe to run
  // unattended). Informational for UIs / confirmation prompts.
  bool reversible = 7;
}

message ListMaintenanceTasksRequest {}
message ListMaintenanceTasksResponse {
  repeated MaintenanceTaskSpec specs = 1;
}

message RunMaintenanceTaskRequest {
  // Task id to run (must match a spec).
  string id = 1;
  // Preview only — report what would happen, change nothing.
  bool validate_only = 2;
}

// The maintenance interface. fvd implements it in-process for the built-in
// tasks; a maintenance plugin implements the same service to contribute its
// own, routed by QueryRPC. "Run all" stays on Fvd.MaintainNow.
service Maintenance {
  // Discover the available tasks (their specs).
  rpc ListTasks(ListMaintenanceTasksRequest) returns (ListMaintenanceTasksResponse);
  // Run a single task by id; returns its outcome.
  rpc RunTask(RunMaintenanceTaskRequest) returns (MaintenanceTask);
}
